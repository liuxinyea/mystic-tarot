name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 安装最新版 pnpm (v4 更加兼容 Node 24)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false # 明确手动安装，避开自动 workspace 探测

      # 2. 设置 Node.js 24 (解决废弃警告)
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # 3. 安装依赖 (如果还有 packages 报错，加上 --no-frozen-lockfile 强制更新一下)
      - name: Install dependencies
        run: pnpm install

      # 4. Nuxt 静态导出
      - name: Static HTML export
        run: pnpm nuxi generate

      - name: Add .nojekyll
        run: touch .output/public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4