name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发，方便排查

# --- 关键修复：防止产物冲突 ---
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # 升级到 v4 适配 Node 24
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 提升版本消除警告
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Static HTML export
        run: pnpm nuxi generate

      - name: Add .nojekyll
        run: touch .output/mystic-tarot/public/.nojekyll

      # 明确指定上传，不使用自定义名称以适配 Pages 规范
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/mystic-tarot/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
